spring:
  datasource:
    url: jdbc:h2:mem:launchstack;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: none

jwt:
  secret: test-secret-for-jwt-signing-in-tests
  access-token-expiration: 900
  refresh-token-expiration: 7200

management:
  health:
    db:
      enabled: false
