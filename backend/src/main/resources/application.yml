server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: launchstack-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:launchstack}}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:launchstack}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:launchstack}}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
    hikari:
      pool-name: LaunchStackHikariPool
      maximum-pool-size: ${SPRING_DATASOURCE_MAXIMUM_POOL_SIZE:10}
      minimum-idle: ${SPRING_DATASOURCE_MINIMUM_IDLE:2}
      connection-timeout: ${SPRING_DATASOURCE_CONNECTION_TIMEOUT:30000}
  flyway:
    # Sprint 1 enables Flyway by default for local development; review this flag per environment if needed.
    enabled: ${SPRING_FLYWAY_ENABLED:true}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
  mvc:
    problemdetails:
      enabled: false

jwt:
  secret: ${JWT_SECRET:change-me-before-production}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:900}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:1209600}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    db:
      enabled: false
